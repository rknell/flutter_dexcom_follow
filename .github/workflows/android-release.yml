name: Android APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Calculate next release version
        id: version
        run: git tag --list | dart run tool/next_android_release_version.dart

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ fromJSON(toJSON(secrets)).ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ fromJSON(toJSON(secrets)).ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ fromJSON(toJSON(secrets)).ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ fromJSON(toJSON(secrets)).ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ fromJSON(toJSON(secrets)).ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ fromJSON(toJSON(secrets)).ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ fromJSON(toJSON(secrets)).ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ fromJSON(toJSON(secrets)).ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks
          {
            printf 'storeFile=../release-keystore.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/teddycom-${{ steps.version.outputs.build_name }}.apk"

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $RELEASE_TAG already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BUILD_NAME: ${{ steps.version.outputs.build_name }}
          RELEASE_BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          {
            printf 'Android package: com.rknell.teddycom\n'
            printf 'Android version code: %s\n\n' "$RELEASE_BUILD_NUMBER"
            printf 'Obtainium setup:\n'
            printf -- '- Source URL: https://github.com/rknell/flutter_dexcom_follow\n'
            printf -- '- Source: GitHub\n'
            printf -- '- APK filter regex: ^teddycom-.*\\.apk$\n'
          } > release-notes.md

          gh release create "$RELEASE_TAG" \
            "build/app/outputs/flutter-apk/teddycom-$RELEASE_BUILD_NAME.apk" \
            --title "Teddycom $RELEASE_BUILD_NAME" \
            --notes-file release-notes.md
